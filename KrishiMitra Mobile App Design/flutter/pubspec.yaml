name: krishi_mitra
description: KrishiMitra - किसान का डिजिटल साथी
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # Navigation
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.2.3

  # Camera / Image
  image_picker: ^1.1.2
  camera: ^0.11.0+1

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
